name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: intuitionx/intuitionx-fleet/fleet

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.production.yml

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            echo "Starting deployment..."

            APP_PATH="${{ secrets.VPS_APP_PATH }}"
            mkdir -p "$APP_PATH"
            cd "$APP_PATH"

            # Clone or update repo (only need compose + config files)
            if [ ! -d .git ]; then
              echo "Cloning repository..."
              git clone --depth 1 https://github.com/${{ github.repository }}.git .
            else
              echo "Pulling latest code..."
              git fetch origin
              git reset --hard origin/main || git reset --hard origin/master
            fi

            # Copy production environment file if it exists
            if [ -f .env.production ]; then
              cp .env.production .env
            fi

            # Log in to GHCR and pull the pre-built image
            echo "Pulling pre-built Fleet image..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/intuitionx/intuitionx-fleet/fleet:latest

            # Backup current deployment
            if docker compose -f docker-compose.production.yml ps -q 2>/dev/null | grep -q .; then
              BACKUP_DIR="backups/$(date +%Y%m%d_%H%M%S)"
              mkdir -p "$BACKUP_DIR"
              docker compose -f docker-compose.production.yml ps > "$BACKUP_DIR/containers.txt" 2>/dev/null || true
            fi

            # Stop existing fleet containers
            echo "Stopping existing containers..."
            docker compose -f docker-compose.production.yml down || true

            # Start containers (no build needed, image already pulled)
            echo "Starting containers..."
            docker compose -f docker-compose.production.yml up -d

            # Wait for services
            echo "Waiting for services to start..."
            sleep 30

            # Health check
            echo "Running health checks..."
            max_attempts=30
            attempt=0

            while [ $attempt -lt $max_attempts ]; do
              if curl -f http://localhost:8080/healthz > /dev/null 2>&1; then
                echo "Fleet server is healthy!"
                break
              fi
              attempt=$((attempt + 1))
              echo "Attempt $attempt/$max_attempts..."
              sleep 5
            done

            if [ $attempt -eq $max_attempts ]; then
              echo "Health check timeout. Recent logs:"
              docker compose -f docker-compose.production.yml logs --tail=20 fleet || true
            fi

            # Clean up old images
            docker image prune -f || true

            echo "Current containers:"
            docker compose -f docker-compose.production.yml ps

            echo "Deployment completed!"
          ENDSSH

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image built and pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- Image pulled on VPS" >> $GITHUB_STEP_SUMMARY
          echo "- Containers restarted" >> $GITHUB_STEP_SUMMARY
